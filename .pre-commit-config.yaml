repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^src/prov/tests/(json|rdf|xml|unification)/
      - id: trailing-whitespace
        exclude: ^src/prov/tests/(json|rdf|xml|unification)/
      - id: check-yaml
      - id: check-toml
