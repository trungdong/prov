---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

# Least privilege: every job only checks out code and reads/uploads coverage
# to the external Coveralls service, so none needs more than read access.
permissions:
  contents: read

jobs:
  tests:
    name: pytest on ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.11"]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@b1de5da23ed0a6d14e0aeee8ed52fdd87af2363c  # v2
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        env:
          # Use the bounded, deterministic Hypothesis profile for the
          # property-based round-trip tests (registered in conftest.py) so they
          # add a small, predictable amount of time to the CI matrix.
          HYPOTHESIS_PROFILE: ci
        run: |
          uv sync --locked --extra rdf --extra xml --extra dot --extra graph --group dev
          uv run coverage run -m pytest
          uv run coverage xml
      - name: Enforce coverage ratchet
        # Enforces the fail_under ratchet from pyproject.toml (exit 2 if below).
        # Gated to one interpreter: the measured TOTAL varies ~0.04pt across
        # CPython minor versions (compiler/arc differences, not our code), and
        # the margin over the ratchet is thin.
        if: matrix.python-version == '3.12'
        run: uv run coverage report
      - name: Coveralls Parallel
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2
        # Advisory upload: a Coveralls outage must not fail the build (rule added
        # after the 2026-07-03 outage blocked PR #174; hotfixed on master in PR #176 —
        # keep continue-on-error on all coverage-upload steps in the rewrite)
        continue-on-error: true
        with:
          flag-name: Python${{ matrix.python-version }}
          parallel: true

  rdflib-compat:
    # The main matrix tests the locked rdflib; this job proves the declared
    # bounds of the `rdf` extra (rdflib>=7.0.0,<8) by running the RDF tests
    # against the floor and the newest allowed 7.x (see docs/dependencies.md).
    name: rdf tests on rdflib ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rdflib-version: "==7.0.0"
            label: "7.0.0 (floor)"
          - rdflib-version: ">=7,<8"
            label: "latest 7.x"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          python-version: "3.12"
      - run: |
          uv sync --locked --extra rdf --extra xml --extra dot --extra graph --group dev
          uv pip install "rdflib${{ matrix.rdflib-version }}"
          uv run --no-sync python -c "import rdflib; print('rdflib', rdflib.__version__)"
          uv run --no-sync pytest src/prov/tests/test_rdf.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - run: |
          uv sync --locked --group dev
          uv run ruff check src/
          uv run ruff format --check src/

  minimal-install:
    # Proves the registry degrades cleanly without the optional rdf/xml/dot/
    # graph extras: `uv sync --group dev` (no --extra flags) leaves rdflib,
    # lxml, pydot, and networkx all absent, so this exercises the same
    # environment shape a user gets from a plain `pip install prov`. Since
    # 3.0.0.dev0 this also proves `import prov.dot`/`import prov.graph` fail
    # informatively without their extras (test_minimal_install.py).
    name: minimal install (no extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Sync without extras
        run: uv sync --locked --group dev
      - name: Degradation tests
        run: uv run --no-sync pytest src/prov/tests/test_minimal_install.py -v

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - run: |
          uv sync --locked --extra rdf --extra xml --extra dot --extra graph --group dev
          uv run mypy src

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - run: |
          uv build
          uvx twine check dist/*

  finish:
    needs: tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2
        continue-on-error: true
        with:
          parallel-finished: true
          carryforward: "Python3.10,Python3.11,Python3.12,Python3.13,Python3.14,Pythonpypy3.11"
