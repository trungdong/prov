---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  tests:
    name: pytest on ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.11"]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          uv sync --locked --extra rdf --extra xml --group dev
          uv run coverage run -m pytest
          # Enforces the fail_under ratchet from pyproject.toml (exit 2 if below)
          uv run coverage report
          uv run coverage xml
      - name: Coveralls Parallel
        uses: coverallsapp/github-action@v2
        # Advisory upload: a Coveralls outage must not fail the build (rule added
        # after the 2026-07-03 outage blocked PR #174; hotfixed on master in PR #176 —
        # keep continue-on-error on all coverage-upload steps in the rewrite)
        continue-on-error: true
        with:
          flag-name: Python${{ matrix.python-version }}
          parallel: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: |
          uv sync --locked --group dev
          uv run ruff check src/
          uv run ruff format --check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: |
          uv sync --locked --extra rdf --extra xml --group dev
          uv run mypy src

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: |
          uv build
          uvx twine check dist/*

  finish:
    needs: tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          parallel-finished: true
          carryforward: "Python3.10,Python3.11,Python3.12,Python3.13,Python3.14,Pythonpypy3.11"
