version: 2
updates:
  # GitHub Actions used in workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python dependencies, resolved via uv.lock
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 2.x maintenance branch: version updates default to the repo's default
  # branch (master), so it needs its own explicit target-branch entries to
  # get security/dependency PRs at all. Its runtime deps differ from
  # master's (networkx/pydot/python-dateutil are unconditional there,
  # rdflib's floor is >=6 not >=7), hence separate blocks rather than
  # reusing the ones above.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "2.x"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "2.x"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
