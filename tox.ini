[tox]
envlist = py39, py310, py311, py312, py313, pypy3
minversion = 4.0
isolated_build = true

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    pypy-3: pypy3

[testenv]
commands =
    coverage run -m pytest
    coverage xml
deps =
    coverage
    pytest
    rdflib>=4.2.1,<7
    lxml>=3.3.5
